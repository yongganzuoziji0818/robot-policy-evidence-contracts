.5" dy="0">Decision</tspan></text><rect x="1280" y="430" width="205" height="95" rx="18" fill="#EAF7F2" stroke="#009E73" stroke-width="2"/><text x="1302" y="465" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#009E73"><tspan x="1302" dy="0">K6</tspan></text><text x="1382.5" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1F2933"><tspan x="1382.5" dy="0">Selection</tspan><tspan x="1382.5" dy="24.8">uncertainty</tspan></text><rect x="1520" y="430" width="205" height="95" rx="18" fill="#EAF7F2" stroke="#009E73" stroke-width="2"/><text x="1542" y="465" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#009E73"><tspan x="1542" dy="0">K7</tspan></text><text x="1622.5" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1F2933"><tspan x="1622.5" dy="0">Transport</tspan></text><line x1="900" y1="412" x2="900" y2="331" stroke="#52606D" stroke-width="4"  marker-end="url(#arrow)"/><text x="930" y="382" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#52606D"><tspan x="930" dy="0">Claim-dependent coverage; contracts are not mapped one-to-one to levels</tspan></text><text x="70" y="610" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#CC79A7"><tspan x="70" dy="0">Representative witnesses</tspan></text><rect x="80" y="650" width="205" height="112" rx="18" fill="#FBF0F7" stroke="#CC79A7" stroke-width="2"/><text x="182.5" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#1F2933"><tspan x="182.5" dy="0">versions, seeds,</tspan><tspan x="182.5" dy="23">solver envelope</tspan></text><line x1="182.5" y1="642" x2="182.5" y2="536" stroke="#CBD5E1" stroke-width="4" stroke-dasharray="8 7"/><rect 